<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Checkout — Lifa Flora</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <style>
    .co-page {
      min-height: 100vh;
      background: var(--pink-bg);
      padding: 6rem 1rem 3rem;
    }

    .co-container {
      max-width: 960px;
      margin: 0 auto;
    }

    .co-heading {
      margin-bottom: 2rem;
    }

    .co-heading .section-tag {
      font-size: 0.82rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--pink-deep);
      margin-bottom: 0.4rem;
      display: block;
    }

    .co-heading h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      color: var(--text-dark);
    }

    .co-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
      align-items: start;
    }

    @media (max-width: 700px) {
      .co-grid { grid-template-columns: 1fr; }
    }

    .co-card {
      background: var(--white);
      border-radius: var(--radius-md);
      border: 1px solid var(--border);
      box-shadow: var(--shadow-sm);
      padding: 1.75rem;
    }

    .co-card h3 {
      font-family: 'Playfair Display', serif;
      font-size: 1.15rem;
      color: var(--text-dark);
      margin-bottom: 1.25rem;
      padding-bottom: 0.75rem;
      border-bottom: 1px solid var(--border);
    }

    .co-field {
      margin-bottom: 1rem;
    }

    .co-field label {
      display: block;
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--text-mid);
      margin-bottom: 0.35rem;
    }

    .co-field input,
    .co-field select,
    .co-field textarea {
      width: 100%;
      padding: 0.7rem 0.9rem;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.92rem;
      color: var(--text-dark);
      background: var(--off-white);
      transition: var(--transition);
      outline: none;
    }

    .co-field input:focus,
    .co-field select:focus,
    .co-field textarea:focus {
      border-color: var(--pink-deep);
      background: var(--white);
      box-shadow: 0 0 0 3px rgba(232,117,143,0.12);
    }

    .co-field textarea {
      resize: vertical;
      min-height: 80px;
    }

    /* Ringkasan item */
    .co-item {
      display: flex;
      align-items: center;
      gap: 0.85rem;
      padding: 0.75rem 0;
      border-bottom: 1px solid var(--border);
    }

    .co-item:last-child {
      border-bottom: none;
    }

    .co-emoji {
      font-size: 1.8rem;
      width: 44px;
      height: 44px;
      background: var(--pink-light);
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .co-item-name {
      font-weight: 500;
      color: var(--text-dark);
      font-size: 0.92rem;
    }

    .co-item-price {
      font-size: 0.85rem;
      color: var(--text-light);
      margin-top: 0.15rem;
    }

    /* Ringkasan harga */
    .co-summary {
      margin-top: 1.25rem;
      border-top: 1px solid var(--border);
      padding-top: 1rem;
    }

    .co-row {
      display: flex;
      justify-content: space-between;
      font-size: 0.9rem;
      color: var(--text-mid);
      margin-bottom: 0.5rem;
    }

    .co-row.total {
      font-weight: 700;
      font-size: 1.05rem;
      color: var(--text-dark);
      margin-top: 0.75rem;
      padding-top: 0.75rem;
      border-top: 1px solid var(--border);
    }

    .co-free {
      color: var(--green-deep);
      font-weight: 500;
    }

    .co-discount {
      color: var(--pink-deep);
    }

    /* Tombol submit */
    .co-submit-btn {
      width: 100%;
      margin-top: 1.25rem;
      padding: 0.9rem;
      background: var(--pink-deep);
      color: var(--white);
      border: none;
      border-radius: var(--radius-full);
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
      transition: var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }

    .co-submit-btn:hover {
      background: #d4617a;
      transform: translateY(-1px);
      box-shadow: var(--shadow-sm);
    }

    .co-submit-btn:disabled {
      background: var(--text-light);
      cursor: not-allowed;
      transform: none;
    }

    .co-error {
      margin-top: 0.75rem;
      font-size: 0.85rem;
      color: #d4617a;
      min-height: 1rem;
    }

    .co-empty {
      text-align: center;
      padding: 2.5rem 1rem;
      color: var(--text-light);
    }

    .co-empty span {
      font-size: 2.5rem;
      display: block;
      margin-bottom: 0.75rem;
    }

    .co-back-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.88rem;
      color: var(--pink-deep);
      text-decoration: none;
      margin-bottom: 1.5rem;
      transition: var(--transition);
    }

    .co-back-btn:hover {
      gap: 0.6rem;
    }
  </style>
</head>
<body>

  <!-- ===================== NAVBAR ===================== -->
  <nav class="navbar" id="navbar">
    <div class="nav-container">
      <a href="index.html" class="nav-logo">
        <span class="logo-icon">🌸</span>
        <span class="logo-text">Lifa <em>Flora</em></span>
      </a>
      <ul class="nav-links" id="navLinks">
        <li><a href="index.html" class="nav-link">Home</a></li>
        <li><a href="index.html#products" class="nav-link">Produk</a></li>
        <li><a href="index.html#contact" class="nav-link">Kontak</a></li>
        <li><a href="tracking.html" class="nav-link">Pesanan</a></li>
        <li id="navLoginItem"><a href="login.html" class="nav-link">Login</a></li>
        <li id="navUserItem" style="display:none;align-items:center;gap:0.5rem;">
          <a href="profile.html" class="nav-link" id="navUserName">👤 Akun</a>
          <button class="nav-link nav-logout-btn" onclick="logoutUser()" style="background:none;border:none;cursor:pointer;font-family:inherit;font-size:inherit;color:inherit;padding:0.4rem 0.75rem;">Keluar</button>
        </li>
      </ul>
      <button class="hamburger" id="hamburger" onclick="toggleMenu()">
        <span></span><span></span><span></span>
      </button>
    </div>
  </nav>

  <!-- ===================== CHECKOUT PAGE ===================== -->
  <main class="co-page">
    <div class="co-container">

      <a href="index.html" class="co-back-btn">← Kembali belanja</a>

      <div class="co-heading">
        <span class="section-tag">Langkah Terakhir</span>
        <h1>Checkout</h1>
      </div>

      <div class="co-grid">

        <!-- KIRI: Form biodata & pengiriman -->
        <div>
          <div class="co-card">
            <h3>🙋 Data Pemesan</h3>
            <div class="co-field">
              <label for="coNama">Nama Lengkap</label>
              <input type="text" id="coNama" placeholder="Masukkan nama lengkap" />
            </div>
            <div class="co-field">
              <label for="coPhone">Nomor WhatsApp</label>
              <input type="tel" id="coPhone" placeholder="+62..." />
            </div>
            <div class="co-field">
              <label for="coAlamat">Alamat Pengiriman</label>
              <textarea id="coAlamat" placeholder="Jalan, kelurahan, kecamatan, kota..."></textarea>
            </div>
          </div>

          <div class="co-card" style="margin-top:1.25rem;">
            <h3>🚗 Pengiriman & Pembayaran</h3>
            <div class="co-field">
              <label for="coShipping">Metode Pengiriman</label>
              <select id="coShipping">
                <option value="0">Reguler — GRATIS (1–2 hari)</option>
                <option value="10000">Express — Rp 10.000 (hari ini)</option>
                <option value="20000">Same Day — Rp 20.000 (2–4 jam)</option>
              </select>
            </div>
            <div class="co-field">
              <label for="coPayment">Metode Pembayaran</label>
              <select id="coPayment">
                <option value="Transfer SeaBank">Transfer SeaBank (901809290073)</option>
                <option value="Transfer BCA">Transfer BCA</option>
                <option value="COD">COD (Bayar di Tempat)</option>
                <option value="E-Wallet">E-Wallet (OVO/GoPay/DANA)</option>
              </select>
            </div>
            <div class="co-field">
              <label for="coVoucher">Kode Voucher (opsional)</label>
              <input type="text" id="coVoucher" placeholder="Contoh: LIFA10" />
            </div>
          </div>
        </div>

        <!-- KANAN: Ringkasan pesanan -->
        <div>
          <div class="co-card">
            <h3>🛍️ Ringkasan Pesanan</h3>

            <!-- Item list — diisi JS -->
            <div id="coCartItems">
              <div class="co-empty">
                <span>🌿</span>
                <p>Keranjang kosong.<br/>Silakan pilih produk dulu.</p>
              </div>
            </div>

            <!-- Totals -->
            <div class="co-summary">
              <div class="co-row">
                <span>Subtotal</span>
                <span id="coSubtotal">Rp 0</span>
              </div>
              <div class="co-row">
                <span>Diskon</span>
                <span class="co-discount" id="coDiscount">-Rp 0</span>
              </div>
              <div class="co-row">
                <span>Ongkir</span>
                <span class="co-free" id="coOngkir">GRATIS</span>
              </div>
              <div class="co-row total">
                <span>Total Bayar</span>
                <span id="coTotal">Rp 0</span>
              </div>
            </div>

            <button class="co-submit-btn" id="coSubmitBtn">
              <i data-lucide="send"></i> Pesan & Kirim ke WhatsApp
            </button>
            <p class="co-error" id="coError"></p>
          </div>
        </div>

      </div>
    </div>
  </main>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script src="script.js"></script>
  <script>
    lucide.createIcons();
    loadState();
    updateNavAuth();
    initCheckoutPage();

    window.addEventListener('scroll', () => {
      document.getElementById('navbar').classList.toggle('scrolled', window.scrollY > 50);
    });
  </script>
</body>
</html>
